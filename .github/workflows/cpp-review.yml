name: C++ RAII Code Review (Docker)

on:
  pull_request:
    paths:
      - '**.cpp'
      - '**.h'
  push:
    branches:
      - main
      - master
    paths:
      - '**.cpp'
      - '**.h'
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: cpp-raii-reviewer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run code review in Docker
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            docker run --rm \
              -v $(pwd):/workspace \
              -e OLLAMA_REVIEW_MODEL=llama3.2:3b \
              cpp-raii-reviewer:latest \
              --base "$BASE_SHA" \
              | tee review-output.txt
          else
            docker run --rm \
              -v $(pwd):/workspace \
              -e OLLAMA_REVIEW_MODEL=llama3.2:3b \
              cpp-raii-reviewer:latest \
              --base HEAD~1 \
              | tee review-output.txt
          fi

      - name: Upload review output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-review-${{ github.run_number }}
          path: review-output.txt
          retention-days: 30
